# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tourdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.autoservice=DEBUG

# TLS / HTTPS
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:MyPassword1!}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=server

# JWT
jwt.secret=${JWT_SECRET_BASE64:bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNFN0cm9uZw==}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXP_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXP_MS:604800000}
