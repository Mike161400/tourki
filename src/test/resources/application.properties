# Test profile
server.ssl.enabled=false
server.port=8080

# In-memory DB for isolated tests
spring.datasource.url=jdbc:h2:mem:tourtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET_BASE64:bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNFN0cm9uZw==}
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
